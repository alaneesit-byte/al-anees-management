<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Anees - Meeting Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Audiowide&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary-navy: #1a3a5a;
            --booked-blue: #007bff;
            --pin-gold: #ffc107;
            --border-color: rgba(255, 255, 255, 0.3);
            --al-anees-blue: #1c5fa8;
            --al-anees-orange: #ff8c00; 
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            user-select: none;
            background: linear-gradient(-45deg, #f4f7f9, #e0eafc, #cfdef3, #f4f7f9);
            background-size: 400% 400%;
            animation: liquidGradient 15s ease infinite;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes liquidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LOGIN SECTION --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            width: 350px;
            text-align: center;
            z-index: 5000;
        }

        .login-field { margin-bottom: 20px; width: 100%; text-align: left; }
        .login-field label { font-size: 11px; font-weight: 800; color: var(--primary-navy); text-transform: uppercase; margin-left: 5px; }
        .login-field input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); 
            background: rgba(255,255,255,0.7); box-sizing: border-box; outline: none; margin-top: 5px;
        }
        .login-btn { 
            width: 100%; padding: 15px; background: var(--al-anees-blue); color: white; border: none; 
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; 
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(28,95,168,0.3); }

        #otp-section { display: none; width: 100%; }
        .otp-input-group { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
        .otp-input-group input { width: 40px; height: 45px; text-align: center; font-size: 18px; font-weight: 800; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); }

        #main-system { display: none; width: 100%; padding: 20px; box-sizing: border-box; }
        .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
        
        .header { 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px);
            padding: 15px 30px; border-radius: 20px; 
            box-shadow: var(--glass-shadow); 
            margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: glassShine 6s infinite;
        }

        @keyframes glassShine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .brand-section { display: flex; flex-direction: column; min-width: 200px; }
        .brand-name { font-family: 'Audiowide', cursive; font-size: 26px; color: var(--al-anees-blue); line-height: 1; }
        .brand-tagline { font-size: 9px; font-weight: 800; color: var(--al-anees-orange); letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }

        .center-section { text-align: center; flex-grow: 1; }
        .center-section h1 { margin: 0 0 10px 0; font-family: 'Audiowide', cursive; font-size: 22px; color: var(--primary-navy); text-transform: uppercase; }
        
        .date-container { display: flex; align-items: center; justify-content: center; gap: 10px; }
        input[type="date"] { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.4); backdrop-filter: blur(5px); font-weight: 600; font-family: 'Inter'; font-size: 14px; outline: none; }
        .day-display-box { padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.4); font-weight: 700; font-size: 14px; color: var(--al-anees-blue); min-width: 100px; text-align: center; }

        .nav-section { display: flex; flex-direction: column; gap: 5px; min-width: 120px; }
        .nav-btn { background: rgba(255,255,255,0.8); border: 1px solid #000; color: #000; cursor: pointer; font-weight: 700; padding: 5px 20px; border-radius: 5px; font-size: 11px; text-transform: uppercase; transition: 0.3s; }
        .nav-btn:hover { background: #000; color: #fff; transform: scale(1.05); }
        .launch-btn { background: var(--al-anees-blue); color: white; border-color: var(--al-anees-blue); }

        .legend-container { display: flex; justify-content: flex-start; gap: 20px; margin-bottom: 15px; padding: 0 10px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--primary-navy); }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); }

        .spreadsheet { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(12px);
            border-radius: 20px; 
            box-shadow: var(--glass-shadow); 
            overflow: hidden; 
            border: 1px solid var(--glass-border);
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: rgba(255, 255, 255, 0.3); padding: 20px; border-bottom: 2px solid var(--border-color); color: var(--primary-navy); font-size: 12px; text-transform: uppercase; font-weight: 800; }
        td { border: 1px solid var(--border-color); height: 95px; padding: 12px; vertical-align: middle; position: relative; }
        .time-col { width: 220px; text-align: center; font-weight: 800; color: #333; background: rgba(255,255,255,0.2); font-size: 13px; border-right: 2px solid var(--border-color); }
        
        .slot { 
            width: 100%; height: 100%; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
            text-align: center;
            position: relative;
        }

        .slot:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1); z-index: 10; }
        .available { background: rgba(255, 255, 255, 0.2); color: rgba(0,0,0,0.3); font-size: 11px; font-weight: 600; }
        .booked { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); color: var(--primary-navy); border-left: 6px solid var(--booked-blue) !important; }
        .permanent { background: rgba(255, 254, 240, 0.7) !important; border: 1px solid var(--pin-gold) !important; border-left: 8px solid var(--pin-gold) !important; }
        .slot-tooltip { visibility: hidden; position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 15px; border-radius: 8px; font-size: 11px; width: 200px; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.3); opacity: 0; transition: 0.3s; pointer-events: none; }
        .slot:hover .slot-tooltip { visibility: visible; opacity: 1; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.25); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-box { background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(25px) saturate(180%); padding: 35px; border-radius: 35px; width: 400px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); transform: scale(0.9) translateY(20px); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
        .modal-box h3 { font-family: 'Audiowide'; color: var(--al-anees-blue); text-align: center; font-size: 24px; margin-bottom: 25px; }

        .modal-field { margin-bottom: 20px; }
        .modal-field label { display: block; font-size: 11px; font-weight: 800; color: var(--primary-navy); text-transform: uppercase; margin-bottom: 8px; }
        .modal-field input, .modal-field textarea { width: 100%; padding: 14px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 15px; font-family: 'Inter'; box-sizing: border-box; background: rgba(255, 255, 255, 0.5); outline: none; }
        
        .save-btn-modal { flex: 1; background: var(--al-anees-blue); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .cancel-btn-modal { flex: 1; background: rgba(0, 0, 0, 0.7); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        #context-menu { position: absolute; display: none; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border: 1px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.15); z-index: 3000; border-radius: 12px; overflow: hidden; min-width: 200px; }
        #context-menu div { padding: 12px 18px; cursor: pointer; font-size: 13px; font-weight: 600; border-bottom: 1px solid rgba(0,0,0,0.05); }
        #context-menu div:hover { background: var(--al-anees-blue); color: white; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="login-screen">
    <div class="brand-name">AL ANEES</div>
    <div class="brand-tagline" style="margin-bottom: 30px;">SECURE LOGIN</div>
    
    <div id="standard-login-fields">
        <div class="login-field">
            <label>Employee ID</label>
            <input type="text" id="empID" placeholder="Enter ID">
        </div>
        <div class="login-field">
            <label>Password</label>
            <input type="password" id="empPass" placeholder="••••••••">
        </div>
        <button class="login-btn" onclick="checkLogin()" style="margin-bottom: 10px;">ACCESS SYSTEM</button>
        <button class="login-btn" onclick="showOTP()" style="background: #444;">LOGIN WITH OTP</button>
    </div>

    <div id="otp-section">
        <div id="otp-request-fields">
            <p style="font-size: 10px; font-weight: 800; color: #666; margin-bottom: 10px;">ENTER DETAILS FOR O.T.P</p>
            <div class="login-field">
                <label>Your Name</label>
                <input type="text" id="otp_userName" placeholder="Enter Full Name">
            </div>
            <div class="login-field">
                <label>Your Email</label>
                <input type="email" id="otp_userEmail" placeholder="Enter Your Email">
            </div>
            <button class="login-btn" id="sendOtpBtn" onclick="sendOTP()">SEND OTP CODE</button>
        </div>

        <div id="otp-inputs" style="display:none;">
            <p style="font-size: 10px; font-weight: 800; color: #666; margin-bottom: 10px;">VERIFY O.T.P CODE</p>
            <div class="otp-input-group">
                <input type="text" maxlength="1" id="o1" onkeyup="moveFocus(this, 'o2')">
                <input type="text" maxlength="1" id="o2" onkeyup="moveFocus(this, 'o3')">
                <input type="text" maxlength="1" id="o3" onkeyup="moveFocus(this, 'o4')">
                <input type="text" maxlength="1" id="o4">
            </div>
            <button class="login-btn" onclick="verifyOTP()">VERIFY & ACCESS</button>
        </div>
        <button class="nav-btn" onclick="location.reload()" style="margin-top:15px; width:100%;">BACK</button>
    </div>
    <p id="login-err" style="color:#d9534f; font-size:12px; margin-top:15px; display:none; font-weight:700;">Invalid Credentials</p>
</div>

<div id="main-system">
    <div class="container">
        <div class="header">
            <div class="brand-section">
                <span class="brand-name">AL ANEES</span>
                <span class="brand-tagline">SINCE 1992</span>
            </div>
            <div class="center-section">
                <h1>Meeting Management</h1>
                <div class="date-container">
                    <input type="date" id="datePicker" onchange="loadDate()">
                    <div id="dayDisplay" class="day-display-box">Today</div>
                </div>
            </div>
            <div class="nav-section">
    <button class="nav-btn" onclick="changeDate(1)">Next</button>
    <button class="nav-btn" onclick="changeDate(-1)">Previous</button>
    <button class="nav-btn" onclick="logout()" style="color:red; border-color:red; margin-top:5px;">Logout</button>
</div>
        </div>

        <div class="legend-container">
            <div class="legend-item"><div class="legend-dot" style="background: rgba(255,255,255,0.4);"></div> Available</div>
            <div class="legend-item"><div class="legend-dot" style="background: var(--booked-blue);"></div> Booked</div>
            <div class="legend-item"><div class="legend-dot" style="background: var(--pin-gold);"></div> Permanent</div>
        </div>

        <div class="spreadsheet">
            <table>
                <thead><tr><th class="time-col">Time Duration</th><th>Conference Room (Big)</th><th>Conference Room (Small)</th></tr></thead>
                <tbody id="gridBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="bookingModal">
    <div class="modal-box">
        <h3 id="modalTitle">New Booking</h3>
        <div class="modal-field"><label>Name</label><input type="text" id="inputName"></div>
        <div class="modal-field"><label>Gmail / Email</label><input type="email" id="inputEmail"></div>
        <div class="modal-field"><label>Agenda</label><input type="text" id="inputAgenda"></div>
        <div class="modal-field"><label>Notes</label><textarea id="inputNotes" rows="2"></textarea></div>
        <div style="display:flex; gap:12px;">
           <button class="btn-primary" onclick="confirmBooking()" style="background-color: #1a63ac; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; letter-spacing: 0.5px; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%;">
    SAVE BOOKING
</button>
            <button class="cancel-btn-modal" onclick="closeModals()">Cancel</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="pinModal">
    <div class="modal-box">
        <h3>Pin to Days</h3>
        <div id="dayPickerGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:15px;"></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="save-btn-modal" onclick="confirmPin()">Confirm Pin</button>
            <button class="save-btn-modal" style="background:#444;" onclick="selectAllDays()">All Days</button>
            <button class="cancel-btn-modal" onclick="closeModals()">Cancel</button>
        </div>
    </div>
</div>

<div id="context-menu" style="display:none; position:absolute; background:white; border-radius:10px; box-shadow:0 10px 25px rgba(0,0,0,0.2); padding:10px; min-width:200px; z-index:10000; border:1px solid #ddd;">
    <style>
        #context-menu button {
            display: block; /* This forces them into a vertical list */
            width: 100%; 
            text-align: left; 
            padding: 12px 15px;
            border: none; 
            background: none; 
            cursor: pointer; 
            font-size: 14px;
            border-radius: 6px;
        }
        #context-menu button:hover { background: #f0f4f8; }
    </style>
    <button onclick="openEditModal()">✏️ Edit Booking</button>
    <button onclick="openHistoryModal()">📜 View History</button>
    <button onclick="setDesktopOutlookReminder()">📅 Add to Outlook</button>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 6px 0;">
    <button id="pin-perm-btn" onclick="openPinModal()" style="display:none;">📌 Pin as Permanent</button>
    <button id="unpin-perm-btn" onclick="togglePermanent(false)" style="display:none;">📍 Unpin Permanent</button>
    <button onclick="deleteBooking()" style="color: #e74c3c; font-weight: bold;">🗑️ Delete Booking</button>
</div>
<div id="historyModal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="max-width: 650px; width: 90%; border-top: 6px solid var(--al-anees-blue);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Slot Activity Log</h2>
            <button onclick="closeModals()" style="background:none; border:none; cursor:pointer; font-size:28px; color:#aaa;">&times;</button>
        </div>
        <div id="historyContent" style="max-height: 500px; overflow-y: auto; padding: 10px; background: #fafafa; border-radius: 8px; border: 1px solid #eee;">
            </div>
        <div style="margin-top: 25px; text-align: right;">
            <button class="btn-primary" onclick="closeModals()" style="padding: 10px 30px;">Close</button>
        </div>
    </div>
</div>
<script>
    const adminEmail = "sajidhhameed1401@gmail.com";
    let generatedOTP = "";
    (function(){ emailjs.init("QcTjWCsESbgBj43VZ"); })();

    // --- 1. LOGIN, OTP & LOGOUT ---
    function showOTP() {
        document.getElementById('standard-login-fields').style.display = 'none';
        document.getElementById('otp-section').style.display = 'block';
        document.getElementById('otp-inputs').style.display = 'none';
    }

    function sendOTP() {
        const userName = document.getElementById('otp_userName').value;
        const userEmail = document.getElementById('otp_userEmail').value;
        const btn = document.getElementById('sendOtpBtn');
        if (!userName || !userEmail) return alert("Please enter your Name and Email first.");

        btn.innerText = "SENDING...";
        btn.disabled = true;
        generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
        
        emailjs.send('service_nvgioq5', 'template_yjywnjc', {
            email: adminEmail,
            from_name: userName,
            from_email: userEmail,
            otp_code: generatedOTP
        }).then(() => {
            alert("OTP Code Sent!");
            document.getElementById('otp-request-fields').style.display = 'none';
            document.getElementById('otp-inputs').style.display = 'block';
        });
    }

    function verifyOTP() {
        const enteredOTP = ['o1','o2','o3','o4'].map(id => document.getElementById(id).value).join('');
        if (enteredOTP === generatedOTP && generatedOTP !== "") {
            enterSystem();
        } else {
            alert("Invalid OTP.");
        }
    }

    function checkLogin() {
        const id = document.getElementById('empID').value;
        const pass = document.getElementById('empPass').value;
        if(id === "admin" && pass === "anees1992") enterSystem();
        else document.getElementById('login-err').style.display = 'block';
    }

    function enterSystem() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-system').style.display = 'block';
        loadDate();
    }

    function logout() {
        if(confirm("Are you sure you want to logout?")) {
            location.reload(); 
        }
    }

    // --- 2. DATE NAVIGATION ---
    function changeDate(days) {
        const dp = document.getElementById('datePicker');
        let d = new Date(dp.value);
        d.setDate(d.getDate() + days);
        dp.value = d.toISOString().split('T')[0];
        updateDateDisplay();
        loadDate();
    }

    function updateDateDisplay() {
        const dp = document.getElementById('datePicker');
        const display = document.getElementById('dayDisplay');
        if (dp && display) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            display.innerText = new Date(dp.value).toLocaleDateString('en-US', options);
        }
    }

    // --- 3. SYSTEM CORE & DATABASE ---
    const grid = document.getElementById('gridBody');
    const menu = document.getElementById('context-menu');
    const _supabase = supabase.createClient('https://msfmqqtlxzuudrsypdak.supabase.co', 'sb_publishable_zR1fAyjSofxeXbnDx6d0AA_gGQY9eL8');
    const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    let sel = null;

    async function loadDate() {
        grid.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">Loading Schedule...</td></tr>';
        const curDateStr = document.getElementById('datePicker').value;
        const curDayName = dayNames[new Date(curDateStr).getDay()];
        
        const [liveRes, permRes] = await Promise.all([
            _supabase.from('meetings').select('*').eq('date', curDateStr),
            _supabase.from('permanent_meetings').select('*').eq('day_name', curDayName.substring(0,3))
        ]);

        grid.innerHTML = '';
        const times = ["07:00 AM - 08:00 AM"];
        let d = new Date(); d.setHours(8, 0, 0);
        while(d.getHours() < 18) {
            let s = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            d.setMinutes(d.getMinutes() + 30);
            let e = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            times.push(`${s} - ${e}`);
        }

        times.forEach(time => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="time-col">${time}</td>`;
            for(let i=0; i<2; i++) {
                const room = i === 0 ? "Meeting Room (Big)" : "Meeting Room (Small)";
                const perm = permRes.data?.find(b => b.time_slot === time && b.room_name === room);
                const live = liveRes.data?.find(b => b.time_slot === time && b.room_name === room);
                const data = perm || live;
                
                const td = document.createElement('td');
                const slot = document.createElement('div');
                
                if(data) {
                    slot.className = perm ? "slot permanent" : "slot booked";
                    slot.innerHTML = `<b>${data.booked_by}</b><div style="font-size:10px;">${data.agenda}</div>`;
                    td.oncontextmenu = (e) => {
                        e.preventDefault();
                        sel = { time, roomIdx: i, id: data.id, isPerm: !!perm, data: { ...data, name: data.booked_by } };
                        document.getElementById('pin-perm-btn').style.display = perm ? 'none' : 'block';
                        document.getElementById('unpin-perm-btn').style.display = perm ? 'block' : 'none';
                        menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                    };
                } else {
                    slot.className = "slot available"; slot.innerText = "Available";
                    slot.onclick = () => openBookingModal(time, i);
                }
                td.appendChild(slot); tr.appendChild(td);
            }
            grid.appendChild(tr);
        });
    }

    // --- 4. PERMANENT PINNING & UNPINNING ---
    function openPinModal() {
        const fullDayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const pGrid = document.getElementById('dayPickerGrid');
        pGrid.innerHTML = fullDayNames.map(day => `
            <div class="day-chip" onclick="toggleDayChip(this)" data-day="${day.substring(0,3)}"
                 style="padding:12px; border:1px solid rgba(255,255,255,0.3); border-radius:12px; text-align:center; cursor:pointer; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); font-weight:bold;">
                ${day}
            </div>
        `).join('');
        document.getElementById('pinModal').style.display = 'flex';
        menu.style.display = 'none';
    }

    function toggleDayChip(chip) {
        if(chip.classList.toggle('active')) {
            chip.style.background = "#1a63ac"; chip.style.color = "white";
        } else {
            chip.style.background = "rgba(255,255,255,0.2)"; chip.style.color = "black";
        }
    }

    function selectAllDays() {
        document.querySelectorAll('.day-chip').forEach(c => { if(!c.classList.contains('active')) toggleDayChip(c); });
    }

    async function confirmPin() {
        const days = Array.from(document.querySelectorAll('.day-chip.active')).map(c => c.dataset.day);
        if(days.length === 0) return alert("Select at least one day");
        
        const pinData = days.map(day => ({
            day_name: day, time_slot: sel.time, room_name: sel.roomIdx === 0 ? "Meeting Room (Big)" : "Meeting Room (Small)",
            booked_by: sel.data.name, agenda: sel.data.agenda, notes: sel.data.notes || "", email: sel.data.email || ""
        }));

        const { error } = await _supabase.from('permanent_meetings').insert(pinData);
        if(!error) {
            if(!sel.isPerm) await _supabase.from('meetings').delete().eq('id', sel.id);
            closeModals(); loadDate();
        } else alert("Error: " + error.message);
    }

    async function unpinBooking() {
        if(!confirm("Remove permanent status?")) return;
        const { error } = await _supabase.from('permanent_meetings').delete().eq('id', sel.id);
        if(!error) { loadDate(); menu.style.display = 'none'; }
    }

    // --- 5. BOOKING & MODALS ---
    function openBookingModal(time, roomIdx) {
        sel = { time, roomIdx };
        document.getElementById('bookingModal').style.display = 'flex';
    }

    async function confirmBooking() {
        const name = document.getElementById('inputName').value.trim();
        const email = document.getElementById('inputEmail').value.trim();
        const agenda = document.getElementById('inputAgenda').value.trim();
        if(!name || !email || !agenda) return alert("Fill all required fields");

        const { error } = await _supabase.from('meetings').insert([{
            date: document.getElementById('datePicker').value, time_slot: sel.time,
            room_name: sel.roomIdx === 0 ? "Meeting Room (Big)" : "Meeting Room (Small)",
            booked_by: name, email: email, agenda: agenda, notes: document.getElementById('inputNotes').value
        }]);

        if(!error) { closeModals(); loadDate(); } else alert(error.message);
    }

    function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
    }

    window.onload = () => {
        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
        updateDateDisplay();
        loadDate();
    };

    window.onclick = (e) => { menu.style.display = 'none'; if(e.target.classList.contains('modal-overlay')) closeModals(); };
</script>
</body>
</html>
