<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Anees - Meeting Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Audiowide&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-navy: #1a3a5a;
            --booked-blue: #007bff;
            --al-anees-blue: #1c5fa8;
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body { 
            font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(-45deg, #f4f7f9, #e0eafc, #cfdef3, #f4f7f9);
            background-size: 400% 400%; animation: liquidGradient 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
        }

        @keyframes liquidGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #login-screen {
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);
            padding: 50px; border-radius: 35px; border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); width: 350px; text-align: center;
        }

        .login-field { margin-bottom: 20px; text-align: left; }
        .login-field label { font-size: 11px; font-weight: 800; color: var(--primary-navy); text-transform: uppercase; }
        .login-field input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); margin-top: 5px; box-sizing: border-box; }
        
        .login-btn { width: 100%; padding: 15px; background: var(--al-anees-blue); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }

        #main-system { display: none; width: 100%; padding: 20px; box-sizing: border-box; }
        .header { background: rgba(255, 255, 255, 0.6); padding: 15px 30px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--glass-border); margin-bottom: 25px; }
        .brand-name { font-family: 'Audiowide'; font-size: 26px; color: var(--al-anees-blue); }
        
        .spreadsheet { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255, 255, 255, 0.3); padding: 15px; color: var(--primary-navy); font-size: 12px; text-transform: uppercase; }
        td { border: 1px solid rgba(255, 255, 255, 0.3); height: 80px; padding: 10px; vertical-align: middle; text-align: center; }
        .time-col { width: 200px; font-weight: 800; background: rgba(255,255,255,0.2); }

        .slot { width: 100%; height: 100%; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; font-weight: 600; }
        .available { color: rgba(0,0,0,0.3); }
        .booked { background: rgba(255, 255, 255, 0.5); color: var(--primary-navy); border-left: 5px solid var(--booked-blue); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: white; padding: 30px; border-radius: 25px; width: 350px; }

        #context-menu { position: absolute; display: none; background: white; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 5px; z-index: 2000; min-width: 160px; }
        #context-menu button { display: block; width: 100%; padding: 10px; border: none; background: none; text-align: left; cursor: pointer; font-weight: 600; font-size: 13px; border-radius: 5px; }
        #context-menu button:hover { background: #f0f4f8; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="brand-name">AL ANEES</div>
    <div class="login-field"><label>Employee ID</label><input type="text" id="empID"></div>
    <div class="login-field"><label>Password</label><input type="password" id="empPass"></div>
    <button class="login-btn" onclick="checkLogin()">LOGIN</button>
</div>

<div id="main-system">
    <div class="header">
        <div class="brand-name">AL ANEES</div>
        <div>
            <input type="date" id="datePicker" onchange="loadDate()">
            <span id="dayDisplay" style="font-weight: 800; margin-left: 10px;"></span>
        </div>
        <button onclick="location.reload()" style="color:red; cursor:pointer; background:none; border:none; font-weight:bold;">Logout</button>
    </div>
    <div class="spreadsheet">
        <table>
            <thead><tr><th class="time-col">Time</th><th>Big Room</th><th>Small Room</th></tr></thead>
            <tbody id="gridBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="bookingModal">
    <div class="modal-box">
        <h3>Booking Details</h3>
        <input type="text" id="inName" placeholder="Name" style="width:100%; margin-bottom:10px; padding:10px;">
        <input type="text" id="inAgenda" placeholder="Agenda" style="width:100%; margin-bottom:15px; padding:10px;">
        <button class="login-btn" onclick="saveBooking()">SAVE</button>
        <button onclick="closeModals()" style="width:100%; margin-top:10px; background:none; border:none; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="context-menu">
    <button onclick="downloadOutlookReminder()">📅 Add to Outlook</button>
    <button onclick="startDelete()" style="color:red; border-top: 1px solid #eee;">🗑 Delete Booking</button>
</div>

<script>
    const _supabase = supabase.createClient('https://msfmqqtlxzuudrsypdak.supabase.co', 'sb_publishable_zR1fAyjSofxeXbnDx6d0AA_gGQY9eL8');
    let sel = null;

    function checkLogin() { if(document.getElementById('empID').value==='admin') enterSystem(); }
    function enterSystem() { document.getElementById('login-screen').style.display='none'; document.getElementById('main-system').style.display='block'; loadDate(); }

    async function loadDate() {
        const date = document.getElementById('datePicker').value;
        const { data } = await _supabase.from('meetings').select('*').eq('date', date);
        const grid = document.getElementById('gridBody'); grid.innerHTML = '';
        
        let d = new Date(); d.setHours(7,0,0,0); 

        for(let i=0; i<15; i++) {
            let s = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: true});
            d.setMinutes(d.getMinutes() + 60);
            let e = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: true});
            const t = `${s} - ${e}`;

            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="time-col">${t}</td>`;
            for(let r=0; r<2; r++) {
                const room = r===0 ? "Big" : "Small";
                const match = data?.find(x => x.time_slot === t && x.room_name === room);
                const td = document.createElement('td');
                const slot = document.createElement('div');
                slot.className = match ? "slot booked" : "slot available";
                slot.innerHTML = match ? `<b>${match.booked_by}</b><span style="font-size:10px;">${match.agenda}</span>` : "Available";
                
                if(match) {
                    td.oncontextmenu = (ev) => {
                        ev.preventDefault(); sel = { id: match.id, time: t, room: room, data: match };
                        const menu = document.getElementById('context-menu');
                        menu.style.display='block'; menu.style.left=ev.pageX+'px'; menu.style.top=ev.pageY+'px';
                    }
                } else {
                    slot.onclick = () => { sel = { time: t, room: room }; document.getElementById('bookingModal').style.display='flex'; }
                }
                td.appendChild(slot); tr.appendChild(td);
            }
            grid.appendChild(tr);
        }
    }

    async function saveBooking() {
        const name = document.getElementById('inName').value;
        const agenda = document.getElementById('inAgenda').value;
        const date = document.getElementById('datePicker').value;
        const { error } = await _supabase.from('meetings').insert([{
            date: date, time_slot: sel.time, room_name: sel.room, booked_by: name, agenda: agenda
        }]);
        if(!error) { closeModals(); loadDate(); }
    }

    async function startDelete() {
        if(confirm("Delete this?")) {
            await _supabase.from('meetings').delete().eq('id', sel.id);
            loadDate();
        }
    }

    // Fixed Outlook Reminder Logic
    function downloadOutlookReminder() {
        if(!sel || !sel.data) return;

        const dateStr = document.getElementById('datePicker').value.replace(/-/g, ''); // Format: YYYYMMDD
        
        // Split time (e.g., "07:00 AM - 08:00 AM")
        const times = sel.time.split(' - ');
        
        function formatTime(timeStr) {
            let [time, modifier] = timeStr.split(' ');
            let [hours, minutes] = time.split(':');
            if (hours === '12') hours = '00';
            if (modifier === 'PM') hours = parseInt(hours, 10) + 12;
            return String(hours).padStart(2, '0') + minutes + "00";
        }

        const startTime = formatTime(times[0]);
        const endTime = formatTime(times[1]);

        const icsContent = [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "PRODID:-//Al Anees//Meeting Management//EN",
            "BEGIN:VEVENT",
            `UID:${Date.now()}@alanees.com`,
            `DTSTAMP:${dateStr}T000000Z`,
            `DTSTART:${dateStr}T${startTime}`,
            `DTEND:${dateStr}T${endTime}`,
            `SUMMARY:Meeting: ${sel.data.agenda}`,
            `DESCRIPTION:Booked by: ${sel.data.booked_by}\\nRoom: ${sel.room}`,
            `LOCATION:Al Anees ${sel.room} Room`,
            "END:VEVENT",
            "END:VCALENDAR"
        ].join("\n");

        const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.setAttribute('download', `Meeting_Reminder_${dateStr}.ics`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function closeModals() { document.getElementById('bookingModal').style.display='none'; }
    window.onclick = () => { document.getElementById('context-menu').style.display='none'; }
    window.onload = () => { document.getElementById('datePicker').value = new Date().toISOString().split('T')[0]; }
</script>
</body>
</html>
